apiVersion: apps/v1
kind: deployment
metadata:
  name: my-deploy
spec:
  replicas :3
  selector:
    matchLabels:
      app: my-app
  template:
    metadata:
      labels:
        app: my-app
    spec:
      containers:
        - name: my-container
          image: ${IMAGE_NAME}
          ports:
            - containerPort: 80
